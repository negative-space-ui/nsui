name: PR Check

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

jobs:
  ci:
    if: |
      startsWith(github.event.pull_request.head.ref, 'feat/') ||
      startsWith(github.event.pull_request.head.ref, 'fix/')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Check changeset exists
        run: |
          if ! ls .changeset/*.md 2>/dev/null | grep -v README > /dev/null; then
            echo "No changeset found."
            exit 1
          fi
          echo "Changeset found."
